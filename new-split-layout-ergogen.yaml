meta:
  engine: 4.1.0
units:
  # Proxy Spacing Variables
  kx: u #19mm spacing between key centers
  ky: u # 19mm spacing between key centers

  # Padding Variables
  px: kx + 4
  py: ky + 4

  kcow: 14 # MX plate cutout width
  kcoh: 14 # MX plate cutout height

points:
  zones:
    matrix:
      # Fix placement in KiCAD
      anchor: 
        shift: [100, -125]
      key:
        padding: 1py
        spread: 1px
      columns:
        outer:
          key.column_net: C1
        pinky:
          key.column_net: C2
        ring:
          key.stagger: 5
          key.column_net: C3
        middle:
          key.stagger: 3
          key.column_net: C4
        index:
          key.stagger: -5
          key.column_net: C5
        inner:
          key.column_net: C6
      rows:
        bottom:
          row_net: R4
        home:
          row_net: R3
        top:
          row_net: R2
        num:
          row_net: R1
    thumbs:
      key:
        padding: 1ky
        spread: 1px
      anchor:
        ref: matrix_inner_bottom
        shift: [0, -50]
      columns:
        insidett:
          key.splay: -15
          key.column_net: C4
        midtt:
          key.column_net: C5
        outt:
          key.column_net: C6
      rows:
        bottom:
          padding: 1py
          row_net: R6
        top:
          row_net: R5

outlines:
  raw:
    - what: rectangle
      where: true
      bound: true
      size: [px, py]
  keys:
    - what: rectangle
      where: true
      bound: false
      size: [kx-0.5,ky-0.5]
  encoder:
    - what: rectangle
      where: matrix_inner_bottom
      bound: false
      size: [kx, ky]
      adjust:
        shift: [1.05px, 0.25ky]
  board:
    - what: polygon
      operation: stack
      points:
        #Main hand top
        - ref: matrix_outer_num
          shift: [-0.6px,0.6py]
        - ref: matrix_pinky_num
          shift: [-0.5px,0.6py]
        - ref: matrix_middle_num
          shift: [-0.5px,0.6py]
        - ref: matrix_middle_num
          shift: [0px,0.6py]
        - ref: matrix_middle_num
          shift: [0.5px,0.6py]
        - ref: matrix_index_num
          shift: [0.5px,0.6py]
        - ref: matrix_inner_num
          shift: [0.5px,0.6py]
        #Special side edge
        - ref: matrix_inner_num
          shift: [1.6px,0.6py]
        - ref: matrix_inner_home
          shift: [1.6px,2py]
        - ref: matrix_inner_home
          shift: [1.6px,-1.75py]
        #Thumb cluster and bottom edge
        - ref: thumbs_outt_top
          shift: [0.65px,0.75py]
        - ref: thumbs_outt_top
          shift: [0.65px,-0.75py]
        - ref: thumbs_outt_bottom
          shift: [0.65px,-0.65py]
        - ref: thumbs_insidett_bottom
          shift: [-0.5px,-0.65py]
        - ref: matrix_pinky_bottom
          shift: [2.5px,-0.6py]
        - ref: matrix_outer_bottom
          shift: [-0.6px,-0.6py]
      fillet: 3
  combo:
    - name: board
    - operation: subtract
      name: keys
    - name: combo
    - operation: subtract
      name: encoder
pcbs:
  ice60:
    template: kicad8
    outlines:
      main:
        outline: board
    footprints:
      keys:
        what: ceoloide/switch_mx
        where: true
        params:
          to: "{{column_net}}"
          from: "{{colrow}}"
          reversible: true
          hotswap: true
          include_keycap: true
      diode:
        what: ceoloide/diode_tht_sod123
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
          reversible: true
          include_tht: true
        adjust:
          shift: [0, -5]
      # Make sure nets are set correctly
      rp2040:
        what: rp_2040_zero
        where:
          ref: matrix_inner_top
          shift: [0.7kx, 0.6ky]
          rotate: 0
        params: 
          GP0: GND
          GP1: ENC_SW
          # I2C shared bus
          GP2: SDA
          GP3: SCL
          # Encoder sync (optional)
          GP4: ENC_A
          GP5: ENC_B
          # Reset line
          GP6: RST
          GP7: DETECT
          GP8: R6
          GP9: R5
          GP10: R4
          GP11: R3
          GP12: R2
          GP13: R1
          GP14: C6
          GP15: C5
          GP26: C4
          GP27: C3
          GP28: C2
          GP29: C1
          # Power
          P3V3: VCC # or leave unused depending on your board
          P5V: VCC
          GND: GND
      # 0.96" OLED 128x64 SSD1306 (Nets ready for checking)
      oled:
        what: oled
        params:
          side: "F"
          SDA: SDA
          SCL: SCL
        where:
          ref: matrix_inner_top
          shift: [1.5kx, 0.5ky]
          rotate: 270
      # reset:
      #   what: button
      #   params:
      #     from: GND
      #     to: RST
      #   where:
      #     ref: matrix_inner_bottom
      #     shift: [1.2kx, -0.7ky]
      
      # Make sure this is correct and see 
      # if there is anything I can wire on P7/P8
      rj45:
        what: rj45_connector
        where:
          ref: matrix_inner_home
          shift: [0.9kx, -2]
          rotate: 90
        params:
          P1: GND
          P2: VCC
          P3: SDA
          P4: SCL
          P5: RST
          P6: DETECT
          P7: NC
          P8: NC
      # EC11 encoder footprint, do I need pull-up resistors?
      encoder:
        what: ceoloide/rotary_encoder_ec11_ec12
        where: 
          ref: matrix_inner_bottom
          shift: [1.05px, 0]
        params:
          reversible: true
          A: ENC_A
          B: ENC_B
          S1: ENC_SW
          S2: GND
      # Silkscreen branding text (No nets needed)
      text:
        what: ceoloide/utility_text
        where:
          ref: matrix_index_bottom
          shift: [0,-1.6ky]
        adjust:
          rotate: -65
        params:
            designator: 'TXT'
            side: 'F'
            thickness: 0.75
            height: 5
            width: 5
            knockout: true
            bold: true
            italic: true
            text: 'Ice60'