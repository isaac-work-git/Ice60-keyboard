meta:
  engine: 4.1.0
units:
  # Proxy Spacing Variables
  kx: u #19mm spacing between key centers
  ky: u # 19mm spacing between key centers

  # Padding Variables
  px: kx + 4
  py: ky + 4

  kcow: 14 # MX plate cutout width
  kcoh: 14 # MX plate cutout height

points:
  zones:
    matrix:
      # Fix placement on KiCAD sheet
      anchor: 
        shift: [100, -125]
      key:
        padding: 1py
        spread: 1px
      columns:
        outer:
        pinky:
        ring:
          key.stagger: 5
        middle:
          key.stagger: 3
        index:
          key.stagger: -5
        inner:
      rows:
        bottom:
        home:
        top:
        num:
    thumbs:
      key:
        padding: 1ky
        spread: 1px
      anchor:
        ref: matrix_inner_bottom
        shift: [0, -50]
      columns:
        layer:
          key.splay: -15
        space:
        enter:
      rows:
        bottom:
          padding: 1py
        top:

outlines:
  raw:
    - what: rectangle
      where: true
      bound: true
      size: [px, py]
  keys:
    - what: rectangle
      where: true
      bound: false
      size: [kx-0.5,ky-0.5]
  encoder:
    - what: rectangle
      where: matrix_inner_bottom
      bound: false
      size: [kx, ky]
      adjust:
        shift: [1.05px, 0.25ky]
  board:
    - what: polygon
      operation: stack
      points:
        #Main hand top
        - ref: matrix_outer_num
          shift: [-0.6px,0.6py]
        - ref: matrix_pinky_num
          shift: [-0.5px,0.6py]
        - ref: matrix_middle_num
          shift: [-0.5px,0.6py]
        - ref: matrix_middle_num
          shift: [0px,0.6py]
        - ref: matrix_middle_num
          shift: [0.5px,0.6py]
        - ref: matrix_index_num
          shift: [0.5px,0.6py]
        - ref: matrix_inner_num
          shift: [0.5px,0.6py]
        #Special side edge
        - ref: matrix_inner_num
          shift: [1.6px,0.6py]
        - ref: matrix_inner_home
          shift: [1.6px,2py]
        - ref: matrix_inner_home
          shift: [1.6px,-1.75py]
        #Thumb cluster and bottom edge
        - ref: thumbs_enter_top
          shift: [0.65px,0.75py]
        - ref: thumbs_enter_top
          shift: [0.65px,-0.75py]
        - ref: thumbs_enter_bottom
          shift: [0.65px,-0.65py]
        - ref: thumbs_layer_bottom
          shift: [-0.5px,-0.65py]
        - ref: matrix_pinky_bottom
          shift: [2.5px,-0.6py]
        - ref: matrix_outer_bottom
          shift: [-0.6px,-0.6py]
      fillet: 3
  combo:
    - name: board
    - operation: subtract
      name: keys
    - name: combo
    - operation: subtract
      name: encoder
pcbs:
  ice60:
    template: kicad8
    outlines:
      main:
        outline: board
    footprints:
      keys:
        what: ceoloide/switch_mx
        where: true
        params:
          to: "{{column_net}}"
          from: "{{colrow}}"
          reversible: true
          hotswap: true
          include_keycap: true
      diode:
        what: ceoloide/diode_tht_sod123
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
          reversible: true
          include_tht: true
        adjust:
          shift: [0, -5]
      # Make sure this is the right model
      rp2040:
        what: rp_2040_zero
        params:  
        where:
          ref: matrix_inner_top
          shift: [0.7kx, 0.5ky]
          rotate: 0
      # Double check what model of oled I want
      oled:
        what: oled
        params:
          side: "F"
          SDA: P2
          SCL: P3
        where:
          ref: matrix_inner_top
          shift: [0.93kx, 0.25ky]
          rotate: 90
      reset:
        what: button
        params:
          from: GND
          to: RST
        where:
          ref: matrix_inner_top
          shift: [1.2kx, -5]
          rotate: -90
      # Find the right model
      # rj45:
      #   what: 
      
      encoder:
        what: ceoloide/rotary_encoder_ec11_ec12
        where: 
          ref: matrix_inner_bottom
          shift: [1.05px, 0.25ky]
        params:
          reversible: true
          A: "{{nets.a}}"
          B: "{{nets.b}}"
          S1: "{{nets.from}}"
          S2: "{{nets.to}}"